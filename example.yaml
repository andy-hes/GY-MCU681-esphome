external_components:
  - source: github://andy-hes/GY-MCU681-esphome
    components: [mcu680]

esphome:
  name: esp32-s3-cam #Add your type of ESP

esp32:
  board: esp32-s3-devkitc-1 #Add your type of ESP
  framework:
    type: esp-idf

logger:

api:
ota:

wifi:
  ssid: "DIN_WIFI"
  password: "DITT_PASSORD"

uart:
  id: uart_bus
  tx_pin: GPIO9 #Change to the GPIO your are using
  rx_pin: GPIO10 #Change to the GPIO your are using
  baud_rate: 9600

mcu680:
  id: air_sensor
  uart_id: uart_bus
  temperature:
    name: "MCU681 Temperatur"
  humidity:
    name: "MCU681 Luftfuktighet"
  pressure:
    name: "MCU681 Trykk"
  iaq:
    name: "MCU681 IAQ"
  iaq_accuracy:
    name: "MCU681 IAQ Accuracy"
  gas_resistance:
    name: "MCU681 Gassmotstand"
  altitude:
    name: "MCU681 Høyde"
