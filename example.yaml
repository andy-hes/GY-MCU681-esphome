external_components:
  - source:
      type: local
      path: ./components
    components: [mcu680]

logger:
  level: DEBUG

uart:
  id: uart_bus
  tx_pin: GPIO9
  rx_pin: GPIO10
  baud_rate: 9600

mcu680:
  id: air_sensor
  uart_id: uart_bus
  temperature:
    name: "MCU681 Temperatur"
  humidity:
    name: "MCU681 Luftfuktighet"
  pressure:
    name: "MCU681 Trykk"
  iaq:
    name: "MCU681 IAQ"
  iaq_accuracy:
    name: "MCU681 IAQ Accuracy"
  gas_resistance:
    name: "MCU681 Gassmotstand"
  altitude:
    name: "MCU681 Høyde"
